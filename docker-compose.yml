services:
    mysql:
        image: mysql:8.0
        container_name: codementor-mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-codementor}
            MYSQL_DATABASE: ${DB_NAME:-codementor}
        ports:
            - "${DB_PORT:-3306}:3306"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./mysql/script.sql:/docker-entrypoint-initdb.d/01_init.sql:ro

volumes:
    mysql_data:
